<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ağ Yönetimi Uzmanlık Testi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; padding: 50px; }
        .quiz-container { background: #16213e; padding: 2rem; border-radius: 15px; width: 450px; text-align: center; border: 2px solid #0f3460; }
        .score { font-size: 1.2rem; margin-bottom: 20px; color: #4ecca3; }
        button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Ağ Yönetimi Sınavı</h2>
    <div class="score">Puan: <span id="puan">0</span></div>
    <p id="soru" style="font-size: 1.1rem; min-height: 50px;"></p>
    <input type="text" id="cevap" placeholder="Cevabınızı buraya yazın...">
    <button onclick="cevapKontrol()">Gönder</button>
</div>

<script>
    const sorular = [
        { soru: "OSI modelinde IP adreslerinin yönetildiği katman hangisidir? (Sayısal girin)", cevap: "3" },
        { soru: "Bir ağdaki cihazların MAC adreslerini IP adresleriyle eşleştiren protokol hangisidir?", cevap: "arp" },
        { soru: "Güvenli web trafiği için kullanılan protokolün adı nedir?", cevap: "https" },
        { soru: "Ağ cihazlarını uzaktan yönetmek için kullanılan, şifrelenmemiş eski protokol nedir?", cevap: "telnet" },
        { soru: "IP adreslerini otomatik atayan protokol hangisidir?", cevap: "dhcp" }
    ];

    let mevcutSoru = 0;
    let skor = 0;

    function guncelle() {
        if(mevcutSoru < sorular.length) {
            document.getElementById("soru").innerText = sorular[mevcutSoru].soru;
        } else {
            document.getElementById("soru").innerHTML = "<b>Sınav Bitti!</b><br>Toplam Skorunuz: " + skor;
            document.getElementById("cevap").style.display = "none";
        }
    }

    function cevapKontrol() {
        let kullanici = document.getElementById("cevap").value.toLowerCase().trim();
        if(kullanici === sorular[mevcutSoru].cevap) {
            skor += 20;
            document.getElementById("puan").innerText = skor;
        }
        document.getElementById("cevap").value = "";
        mevcutSoru++;
        guncelle();
    }

    guncelle();
</script>
</body>
</html>
